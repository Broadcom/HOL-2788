#cloud-config
ssh_pwauth: true
groups:
- admingroup: [root,sys]
users:
  - name: devops
    gecos: Dev S. Ops
    lock_passwd: false
    passwd: $6$n/zJuy.x/O0oRKHp$sRK0wNmKkTRX26poRTVPIsXiz4u9SvVR2euzNV7ZXR9DTD.L3XgH0TgZZyxiGE1Mw.B6D8YcqCrLpwDCoRnBQ.
    # Password set to DevOps123
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo, users, admin
    shell: /bin/bash
runcmd:
  # Update packages
  - sudo apt-get update && sudo apt-get upgrade
  # Install tools
  - sudo apt install -y ca-certificates curl wget gnupg net-tools zip unzip jq zsh bat bash-completion whois parted
  #Install VCF CLI
  - wget https://packages.broadcom.com/artifactory/vcf-distro/vcf-cli/linux/amd64/v9.0.0/vcf-cli.tar.gz
  - tar -xvf vcf-cli.tar.gz
  - sudo install vcf-cli-linux_amd64 /usr/local/bin/vcf
  #Install kubectl
  - sudo apt install curl
  - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
  - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl.sha256"
  - echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
  - sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
  # Install Docker
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sudo sh get-docker.sh
  - sudo usermod -aG docker devops